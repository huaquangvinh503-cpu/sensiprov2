<!DOCTYPE html>
<html>
<head>
<title>ADMIN PANEL</title>
<style>

body{
background:#0a0a12;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111;
padding:30px;
border-radius:10px;
width:300px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
}

button{
background:#00ff88;
font-weight:bold;
}

</style>
</head>

<body>

<div class="box">

<h2>TẠO KEY</h2>

<input id="keyName" placeholder="Tên key">

<select id="keyTime">
<option value="1">1 ngày</option>
<option value="7">7 ngày</option>
<option value="30">30 ngày</option>
</select>

<button onclick="taoKey()">TẠO KEY</button>

<p id="result"></p>

</div>

<script>

function taoKey(){

let name = document.getElementById("keyName").value;
let time = document.getElementById("keyTime").value;

let keys = JSON.parse(localStorage.getItem("keys") || "{}");

let expire = Date.now() + (time * 86400000);

let newKey = name + "-" + Math.random().toString(36).substring(2,7).toUpperCase();

keys[newKey] = expire;

localStorage.setItem("keys", JSON.stringify(keys));

document.getElementById("result").innerText = "KEY: " + newKey;

}

</script>

</body>
</html>
