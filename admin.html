<!DOCTYPE html>
<html>
<head>
<title>ADMIN KEY</title>
</head>

<body>

<button onclick="createKeys()">Tạo 100 Key</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = {
apiKey: "APIKEY",
authDomain: "PROJECT.firebaseapp.com",
databaseURL: "DATABASE_URL",
projectId: "PROJECT"
};

firebase.initializeApp(firebaseConfig);

function randomKey(){
return "KTIEN-" + Math.random().toString(36).substring(2,8).toUpperCase();
}

function createKeys(){

for(let i=0;i<100;i++){

let key=randomKey();

firebase.database().ref("keys/"+key).set({
device:"",
expire:0
});

}

alert("Đã tạo 100 key");

}

</script>

</body>
</html>
